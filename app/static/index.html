<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Paper-only live sports market signal monitor">
  <title>Live Edge Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080a;
      --bg-2: #0b0d11;
      --panel: #0c0f13;
      --panel-2: #12171f;
      --line: #1d2530;
      --line-bright: #2b3947;
      --text: #e9efe8;
      --muted: #78878a;
      --faint: #47535c;
      --accent: #ff4d2e;      /* Marathon coral */
      --accent-dim: #b8371f;
      --cyan: #29e7d6;
      --yes: #29e7d6;         /* cyan = signal go */
      --no: #ff4d2e;          /* coral = signal warn */
      --warn: #ffcf3f;        /* acid yellow */
      --radius: 2px;
      --mono: ui-monospace, "Cascadia Mono", "JetBrains Mono", "Segoe UI Mono", Consolas, monospace;
      --sans: "Segoe UI", ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(120% 80% at 85% -10%, rgba(255, 77, 46, .10), transparent 55%),
        radial-gradient(90% 70% at 0% 0%, rgba(41, 231, 214, .06), transparent 50%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      background-attachment: fixed;
      color: var(--text);
      font: 14px/1.5 var(--sans);
      letter-spacing: .01em;
    }
    /* scanline / CRT overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9;
      background: repeating-linear-gradient(0deg, rgba(0, 0, 0, .16) 0, rgba(0, 0, 0, .16) 1px, transparent 2px, transparent 3px);
      mix-blend-mode: multiply;
      opacity: .5;
    }
    button, input { font: inherit; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 26px 20px 72px; position: relative; z-index: 1; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-bottom: 18px;
      margin-bottom: 26px;
      border-bottom: 1px solid var(--line);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .live-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0 3px rgba(41, 231, 214, .15), 0 0 12px var(--cyan);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
    h1 {
      margin: 0;
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .brand small { display: block; margin-top: 3px; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: .06em; }
    .config {
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .05em;
      text-transform: uppercase;
      border: 1px solid var(--line-bright);
      padding: 7px 13px;
      white-space: nowrap;
      background: rgba(41, 231, 214, .04);
    }

    .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }

    /* HUD frame: opposing corner brackets */
    .panel, .event, .config, .empty {
      position: relative;
      background: linear-gradient(180deg, rgba(255, 255, 255, .015), transparent), var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .panel::before, .panel::after,
    .event::before, .event::after {
      content: "";
      position: absolute;
      width: 13px;
      height: 13px;
      pointer-events: none;
      border: 1px solid var(--accent);
    }
    .panel::before, .event::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
    .panel::after, .event::after { right: -1px; bottom: -1px; border-left: 0; border-top: 0; }
    .panel-pad { padding: 18px; }
    .section-title {
      margin: 0 0 14px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .section-title::before { content: "// "; color: var(--accent); }

    label { display: block; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: .05em; text-transform: uppercase; margin: 14px 0 5px; }
    label:first-of-type { margin-top: 0; }
    .optional { color: var(--faint); text-transform: none; }
    input {
      width: 100%;
      padding: 9px 11px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--line-bright);
      border-radius: 0;
      font-family: var(--mono);
      font-size: 13px;
      transition: border-color .15s, box-shadow .15s;
    }
    input::placeholder { color: var(--faint); }
    input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 1px var(--cyan), 0 0 14px rgba(41, 231, 214, .25); }
    button {
      border: 0;
      border-radius: 0;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 11px 14px;
      cursor: pointer;
      transition: opacity .15s, background .15s, border-color .15s, box-shadow .15s, color .15s;
    }
    button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
    button:disabled { opacity: .55; cursor: wait; }
    .btn-primary {
      width: 100%; margin-top: 18px; color: #0a0605; background: var(--accent);
      clip-path: polygon(9px 0, 100% 0, 100% calc(100% - 9px), calc(100% - 9px) 100%, 0 100%, 0 9px);
    }
    .btn-primary:hover { background: #ff6244; box-shadow: 0 0 18px rgba(255, 77, 46, .45); }
    .btn-ghost { width: 100%; margin-top: 10px; color: var(--cyan); background: transparent; border: 1px solid var(--line-bright); }
    .btn-ghost:hover { border-color: var(--cyan); box-shadow: inset 0 0 12px rgba(41, 231, 214, .1); }
    .note { margin: 16px 0 0; padding-top: 14px; border-top: 1px dashed var(--line); color: var(--faint); font-size: 11px; line-height: 1.55; }

    .stack { display: flex; flex-direction: column; gap: 16px; }
    .event { overflow: hidden; }
    .event-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 15px 18px;
      background: rgba(255, 255, 255, .015);
      border-bottom: 1px solid var(--line);
    }
    .event-head .name { font-family: var(--mono); font-size: 14px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    .event-head .meta { margin-top: 3px; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: .04em; }
    .event-actions { display: flex; align-items: center; gap: 14px; }
    .score {
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: .02em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-shadow: 0 0 16px rgba(41, 231, 214, .25);
    }
    .score .sep { color: var(--accent); margin: 0 5px; }
    .btn-remove { padding: 6px 10px; color: var(--no); background: transparent; border: 1px solid rgba(255, 77, 46, .4); font-size: 10px; }
    .btn-remove:hover { background: rgba(255, 77, 46, .1); border-color: var(--accent); }

    .markets { display: flex; flex-direction: column; }
    .market { padding: 15px 18px; border-bottom: 1px solid var(--line); }
    .market:last-child { border-bottom: 0; }
    .market-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .outcome { font-family: var(--mono); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    .outcome small { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; font-weight: 400; letter-spacing: .03em; }
    .tag {
      padding: 4px 11px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      border: 1px solid currentColor;
      clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
    }
    .tag.bet { color: var(--cyan); background: rgba(41, 231, 214, .1); text-shadow: 0 0 10px rgba(41, 231, 214, .5); }
    .tag.watch { color: var(--warn); background: rgba(255, 207, 63, .08); }

    .figs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
    .fig { padding: 10px 12px; background: var(--panel-2); border-left: 2px solid var(--line-bright); }
    .fig .key { color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: .05em; text-transform: uppercase; }
    .fig .value { margin-top: 3px; font-family: var(--mono); font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .fig .hint { margin-top: 2px; color: var(--faint); font-size: 10px; }
    .value.positive { color: var(--cyan); }
    .value.negative { color: var(--no); }
    .denominator { color: var(--faint); font-size: 12px; }

    .bar { height: 6px; margin-top: 14px; overflow: hidden; background: var(--panel-2); border: 1px solid var(--line); }
    .bar i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
      box-shadow: 0 0 10px rgba(41, 231, 214, .4);
      transition: width .4s ease;
    }
    .why { margin-top: 13px; }
    .why summary { color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; cursor: pointer; list-style: none; }
    .why summary::-webkit-details-marker { display: none; }
    .why summary::before { content: "[+] "; color: var(--accent); }
    .why[open] summary::before { content: "[-] "; }
    .why ul { margin: 9px 0 0; padding-left: 18px; color: var(--muted); font-size: 12px; }
    .why li { margin: 4px 0; }
    .pending { padding: 15px 18px; color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: .04em; }
    .empty { padding: 72px 20px; color: var(--muted); text-align: center; }
    .empty b { display: block; margin-bottom: 6px; color: var(--text); font-family: var(--mono); font-size: 14px; letter-spacing: .08em; text-transform: uppercase; }
    .error { margin-bottom: 14px; padding: 10px 12px; color: #ffb4ae; background: rgba(255, 77, 46, .1); border: 1px solid rgba(255, 77, 46, .4); border-radius: 0; font-family: var(--mono); font-size: 12px; }
    [hidden] { display: none !important; }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .figs { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 520px) {
      header, .event-head { align-items: flex-start; flex-direction: column; }
      .event-actions { width: 100%; justify-content: space-between; }
      .figs { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      .live-dot { animation: none; }
      .bar i { transition: none; }
    }

    /* truth loop: CLV & calibration */
    .metrics-panel { padding: 18px; margin-bottom: 20px; }
    .metrics-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    .metrics-head .section-title { margin: 0; }
    .metrics-sub { color: var(--faint); font-family: var(--mono); font-size: 11px; letter-spacing: .04em; }
    .metric-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(128px, 1fr)); gap: 12px; margin-top: 14px; }
    .mtile { padding: 11px 13px; background: var(--panel-2); border-left: 2px solid var(--line-bright); }
    .mtile .k { color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: .05em; text-transform: uppercase; }
    .mtile .v { margin-top: 4px; font-family: var(--mono); font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .mtile .v.good { color: var(--cyan); }
    .mtile .v.bad { color: var(--no); }
    .mtile .sub2 { margin-top: 2px; color: var(--faint); font-family: var(--mono); font-size: 10px; }
    .metrics-empty { margin-top: 12px; color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: .03em; }
    .reliability { display: flex; align-items: flex-end; gap: 6px; margin-top: 18px; flex-wrap: wrap; }
    .rbin { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .rtrack { position: relative; width: 26px; height: 60px; background: var(--panel-2); border: 1px solid var(--line); }
    .remp { position: absolute; left: 0; right: 0; bottom: 0; background: rgba(255, 77, 46, .55); }
    .rpred { position: absolute; left: -1px; right: -1px; height: 2px; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
    .rlabel { color: var(--faint); font-family: var(--mono); font-size: 9px; }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="brand">
        <span class="live-dot" aria-hidden="true"></span>
        <div>
          <h1>Live Edge Monitor</h1>
          <small>Paper signals only · never places a wager</small>
        </div>
      </div>
      <div class="config" id="config">Loading thresholds…</div>
    </header>

    <section class="panel metrics-panel" id="metrics" aria-labelledby="metrics-heading">
      <div class="metrics-head">
        <h2 class="section-title" id="metrics-heading">Truth loop · CLV &amp; calibration</h2>
        <span class="metrics-sub" id="metrics-sub"></span>
      </div>
      <div id="metrics-body" aria-live="polite"></div>
    </section>

    <div class="grid">
      <aside class="panel panel-pad">
        <h2 class="section-title">Register event</h2>
        <div class="error" id="form-error" role="alert" hidden></div>
        <form id="form">
          <label for="event-name">Event name</label>
          <input id="event-name" name="name" required placeholder="Knicks vs Celtics">
          <label for="sport">Sport</label>
          <input id="sport" name="sport" required placeholder="basketball">
          <label for="home">Home team</label>
          <input id="home" name="home" required>
          <label for="away">Away team</label>
          <input id="away" name="away" required>
          <label for="polymarket-slug">Polymarket slug <span class="optional">(optional)</span></label>
          <input id="polymarket-slug" name="polymarket_slug" placeholder="nba-nyk-bos-2026-…">
          <label for="odds-sport">TheOddsAPI sport key <span class="optional">(optional)</span></label>
          <input id="odds-sport" name="odds_api_sport" placeholder="basketball_nba">
          <label for="odds-event">TheOddsAPI event ID <span class="optional">(optional)</span></label>
          <input id="odds-event" name="odds_api_event_id">
          <button class="btn-primary" id="submit-event" type="submit">Start monitoring</button>
        </form>
        <button class="btn-ghost" id="demo" type="button">Launch live demo</button>
        <p class="note">Research software, not financial advice. Signal quality is a data-quality score, not a predicted win rate.</p>
      </aside>

      <section aria-labelledby="events-heading">
        <h2 class="section-title" id="events-heading">Monitored events</h2>
        <div id="events" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <script>
    const esc = value => String(value ?? "").replace(/[&<>"']/g, character => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
    })[character]);
    const pct = value => `${(value * 100).toFixed(1)}%`;
    const signedPct = value => `${value >= 0 ? "+" : ""}${pct(value)}`;
    const detailKey = (eventId, signal) => encodeURIComponent(`${eventId}|${signal.market}|${signal.outcome}`);
    let refreshInFlight = false;

    function marketRow(eventId, signal, openDetails) {
      const paperBet = signal.action === "PAPER_BET";
      const key = detailKey(eventId, signal);
      const quality = Math.max(0, Math.min(100, signal.confidence));
      return `<div class="market">
        <div class="market-top">
          <div class="outcome">${esc(signal.outcome)}<small>${esc(signal.market)}</small></div>
          <span class="tag ${paperBet ? "bet" : "watch"}">${esc(signal.action.replace("_", " "))}</span>
        </div>
        <div class="figs">
          <div class="fig" title="The engine's estimated probability that this outcome wins">
            <div class="key">Model probability</div>
            <div class="value">${pct(signal.model_probability)}</div>
            <div class="hint">Estimated chance</div>
          </div>
          <div class="fig" title="Model probability minus the best executable market probability">
            <div class="key">Estimated edge</div>
            <div class="value ${signal.edge >= 0 ? "positive" : "negative"}">${signedPct(signal.edge)}</div>
            <div class="hint">Model minus market</div>
          </div>
          <div class="fig" title="Freshness, source agreement/count, spread, and edge strength">
            <div class="key">Signal quality</div>
            <div class="value">${signal.confidence.toFixed(0)}<span class="denominator">/100</span></div>
            <div class="hint">Not a win probability</div>
          </div>
        </div>
        <div class="bar" aria-label="Signal quality ${signal.confidence.toFixed(0)} out of 100"><i style="width:${quality}%"></i></div>
        <details class="why" data-detail-key="${key}"${openDetails.has(key) ? " open" : ""}>
          <summary>Why this signal?</summary>
          <ul>${signal.reasons.map(reason => `<li>${esc(reason)}</li>`).join("")}</ul>
        </details>
      </div>`;
    }

    function eventCard({ event, latest_state: state, signals }, openDetails) {
      const score = state
        ? `${state.home_score}<span class="sep">–</span>${state.away_score}`
        : "—";
      const markets = signals.slice(0, 3).map(signal => marketRow(event.id, signal, openDetails)).join("");
      return `<article class="event" data-event-id="${esc(event.id)}">
        <div class="event-head">
          <div>
            <div class="name">${esc(event.name)}</div>
            <div class="meta">${esc(event.sport)} · ${esc(state?.period || "waiting")} ${esc(state?.clock || "")}</div>
          </div>
          <div class="event-actions">
            <div class="score">${score}</div>
            <button class="btn-remove" type="button" data-remove-event="${esc(event.id)}" aria-label="Remove ${esc(event.name)}">Remove</button>
          </div>
        </div>
        <div class="markets">${markets || '<div class="pending">Waiting for enough market data…</div>'}</div>
      </article>`;
    }

    async function refresh() {
      if (refreshInFlight) return;
      refreshInFlight = true;
      const root = document.querySelector("#events");
      const openDetails = new Set(
        [...root.querySelectorAll("details[open][data-detail-key]")].map(detail => detail.dataset.detailKey)
      );
      try {
        const response = await fetch("/api/events");
        if (!response.ok) throw new Error(`Event refresh failed (${response.status})`);
        const events = await response.json();
        root.innerHTML = events.length
          ? `<div class="stack">${events.map(event => eventCard(event, openDetails)).join("")}</div>`
          : '<div class="panel empty"><b>No events yet</b>Launch the demo or register an event to begin monitoring.</div>';
      } catch (error) {
        if (!root.children.length) {
          root.innerHTML = '<div class="panel empty"><b>Dashboard disconnected</b>Check that the server is still running.</div>';
        }
      } finally {
        refreshInFlight = false;
      }
    }

    document.querySelector("#form").addEventListener("submit", async event => {
      event.preventDefault();
      const form = event.currentTarget;
      const submit = document.querySelector("#submit-event");
      const errorBox = document.querySelector("#form-error");
      const payload = Object.fromEntries(new FormData(form));
      Object.keys(payload).forEach(key => { if (!payload[key]) delete payload[key]; });
      submit.disabled = true;
      errorBox.hidden = true;
      try {
        const response = await fetch("/api/events", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(body.detail || `Could not register event (${response.status})`);
        }
        form.reset();
        await refresh();
      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.hidden = false;
      } finally {
        submit.disabled = false;
      }
    });

    document.querySelector("#demo").addEventListener("click", async event => {
      const button = event.currentTarget;
      button.disabled = true;
      try {
        const response = await fetch("/api/demo", { method: "POST" });
        if (!response.ok) throw new Error("Could not launch demo");
        await refresh();
      } finally {
        button.disabled = false;
      }
    });

    document.querySelector("#events").addEventListener("click", async event => {
      const button = event.target.closest("[data-remove-event]");
      if (!button) return;
      button.disabled = true;
      const response = await fetch(`/api/events/${encodeURIComponent(button.dataset.removeEvent)}`, { method: "DELETE" });
      if (response.ok) { await refresh(); refreshMetrics(); }
      else button.disabled = false;
    });

    function metricTile(key, value, cls, sub) {
      return `<div class="mtile"><div class="k">${key}</div>` +
        `<div class="v${cls ? " " + cls : ""}">${value}</div>` +
        `${sub ? `<div class="sub2">${sub}</div>` : ""}</div>`;
    }

    function reliabilityView(bins) {
      if (!bins || !bins.length) return "";
      const cols = bins.map(bin => `<div class="rbin" title="predicted ${pct(bin.mean_predicted)} · actual ${pct(bin.empirical_rate)} · n=${bin.count}">
          <div class="rtrack">
            <div class="remp" style="height:${(bin.empirical_rate * 100).toFixed(1)}%"></div>
            <div class="rpred" style="bottom:${(bin.mean_predicted * 100).toFixed(1)}%"></div>
          </div>
          <div class="rlabel">${Math.round(bin.lo * 100)}</div>
        </div>`).join("");
      return `<div class="reliability">${cols}</div>` +
        `<div class="metrics-sub" style="margin-top:8px">Reliability by predicted probability — bar = actual win rate, line = predicted. Aligned = calibrated.</div>`;
    }

    async function refreshMetrics() {
      const body = document.querySelector("#metrics-body");
      const sub = document.querySelector("#metrics-sub");
      let m;
      try {
        const response = await fetch("/api/metrics");
        if (!response.ok) return;
        m = await response.json();
      } catch (error) { return; }
      if (!m || !m.n_bets) {
        sub.textContent = "";
        body.innerHTML = '<div class="metrics-empty">No paper bets logged yet — CLV and calibration appear once PAPER_BET signals fire and events finalize.</div>';
        return;
      }
      const clv = m.clv || {}, model = m.model || {}, base = m.market_baseline || {};
      sub.textContent = `${m.n_bets} paper bet(s) · ${m.n_settled} settled`;
      const tiles = [];
      if (clv.beat_close_rate != null) {
        tiles.push(metricTile("Beat close", `${(clv.beat_close_rate * 100).toFixed(0)}%`,
          clv.beat_close_rate >= 0.5 ? "good" : "bad", `n=${clv.n}`));
      } else {
        tiles.push(metricTile("Beat close", "—", "", "awaiting closes"));
      }
      tiles.push(clv.mean_clv != null
        ? metricTile("Mean CLV", signedPct(clv.mean_clv), clv.mean_clv >= 0 ? "good" : "bad", "vs closing fair")
        : metricTile("Mean CLV", "—", ""));
      tiles.push(metricTile("Settled", String(m.n_settled), "", "moneyline"));
      if (model.brier != null && base.brier != null) {
        tiles.push(metricTile("Model Brier", model.brier.toFixed(3),
          model.brier < base.brier ? "good" : "bad", `mkt ${base.brier.toFixed(3)}`));
      } else if (model.brier != null) {
        tiles.push(metricTile("Model Brier", model.brier.toFixed(3), ""));
      } else {
        tiles.push(metricTile("Model Brier", "—", "", "awaiting settle"));
      }
      if (model.log_loss != null) {
        tiles.push(metricTile("Log loss", model.log_loss.toFixed(3), "",
          base.log_loss != null ? `mkt ${base.log_loss.toFixed(3)}` : ""));
      }
      if (model.ece != null) {
        tiles.push(metricTile("ECE", model.ece.toFixed(3), "", "calibration gap"));
      }
      body.innerHTML = `<div class="metric-tiles">${tiles.join("")}</div>` + reliabilityView(m.reliability);
    }

    fetch("/api/config")
      .then(response => response.json())
      .then(config => {
        document.querySelector("#config").textContent =
          `Quality ≥ ${config.confidence_threshold} · Edge ≥ ${(config.edge_threshold * 100).toFixed(1)}%`;
      })
      .catch(() => { document.querySelector("#config").textContent = "Thresholds unavailable"; });

    refresh();
    refreshMetrics();
    setInterval(refresh, 1000);
    setInterval(refreshMetrics, 5000);
  </script>
</body>
</html>
