<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Paper-only live sports market signal monitor">
  <title>Live Edge Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c222b;
      --line: #2a313c;
      --text: #e6edf3;
      --muted: #8b949e;
      --faint: #6e7681;
      --accent: #2f81f7;
      --yes: #3fb950;
      --no: #f85149;
      --warn: #d29922;
      --radius: 12px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    button, input { font: inherit; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 64px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-bottom: 20px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .live-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--yes);
      box-shadow: 0 0 0 4px rgba(63, 185, 80, .15);
    }
    h1 { margin: 0; font-size: 17px; font-weight: 650; letter-spacing: -.01em; }
    .brand small { display: block; color: var(--muted); font-size: 12px; }
    .config {
      color: var(--muted);
      font-size: 12px;
      border: 1px solid var(--line);
      padding: 6px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); }
    .panel-pad { padding: 18px; }
    .section-title {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    label { display: block; color: var(--muted); font-size: 12px; margin: 12px 0 5px; }
    label:first-of-type { margin-top: 0; }
    .optional { color: var(--faint); }
    input {
      width: 100%;
      padding: 9px 11px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      transition: border-color .15s, box-shadow .15s;
    }
    input::placeholder { color: var(--faint); }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47, 129, 247, .12); }
    button {
      border: 0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 650;
      padding: 10px 14px;
      cursor: pointer;
      transition: opacity .15s, background .15s, border-color .15s;
    }
    button:hover { opacity: .9; }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    button:disabled { opacity: .55; cursor: wait; }
    .btn-primary { width: 100%; margin-top: 16px; color: #fff; background: var(--accent); }
    .btn-ghost { width: 100%; margin-top: 10px; color: var(--text); background: transparent; border: 1px solid var(--line); }
    .note { margin: 16px 0 0; padding-top: 14px; border-top: 1px solid var(--line); color: var(--faint); font-size: 11px; }

    .stack { display: flex; flex-direction: column; gap: 14px; }
    .event { overflow: hidden; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); }
    .event-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }
    .event-head .name { font-size: 15px; font-weight: 650; }
    .event-head .meta { margin-top: 2px; color: var(--muted); font-size: 12px; }
    .event-actions { display: flex; align-items: center; gap: 12px; }
    .score { font-size: 22px; font-weight: 700; letter-spacing: -.02em; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .score .sep { color: var(--faint); margin: 0 4px; }
    .btn-remove { padding: 6px 9px; color: var(--no); background: transparent; border: 1px solid rgba(248, 81, 73, .45); font-size: 11px; }
    .btn-remove:hover { background: rgba(248, 81, 73, .08); }

    .markets { display: flex; flex-direction: column; }
    .market { padding: 14px 18px; border-bottom: 1px solid var(--line); }
    .market:last-child { border-bottom: 0; }
    .market-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .outcome { font-weight: 650; }
    .outcome small { display: block; margin-top: 1px; color: var(--muted); font-size: 12px; font-weight: 400; }
    .tag { padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 650; letter-spacing: .04em; text-transform: uppercase; }
    .tag.bet { color: var(--yes); background: rgba(63, 185, 80, .15); }
    .tag.watch { color: var(--warn); background: rgba(210, 153, 34, .15); }

    .figs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
    .fig .key { color: var(--muted); font-size: 11px; }
    .fig .value { margin-top: 2px; font-size: 16px; font-weight: 650; font-variant-numeric: tabular-nums; }
    .fig .hint { color: var(--faint); font-size: 10px; }
    .value.positive { color: var(--yes); }
    .value.negative { color: var(--no); }
    .denominator { color: var(--faint); font-size: 12px; }

    .bar { height: 5px; margin-top: 12px; overflow: hidden; background: var(--panel-2); border-radius: 999px; }
    .bar i { display: block; height: 100%; background: var(--accent); border-radius: inherit; transition: width .4s ease; }
    .why { margin-top: 12px; }
    .why summary { color: var(--muted); font-size: 12px; cursor: pointer; list-style: none; }
    .why summary::-webkit-details-marker { display: none; }
    .why summary::before { content: "▸ "; color: var(--faint); }
    .why[open] summary::before { content: "▾ "; }
    .why ul { margin: 8px 0 0; padding-left: 16px; color: var(--muted); font-size: 12px; }
    .why li { margin: 3px 0; }
    .pending { padding: 14px 18px; color: var(--muted); font-size: 13px; }
    .empty { padding: 72px 20px; color: var(--muted); text-align: center; }
    .empty b { display: block; margin-bottom: 6px; color: var(--text); font-size: 15px; }
    .error { margin-bottom: 14px; padding: 10px 12px; color: #ffb4ae; background: rgba(248, 81, 73, .1); border: 1px solid rgba(248, 81, 73, .35); border-radius: 8px; font-size: 12px; }
    [hidden] { display: none !important; }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .figs { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 520px) {
      header, .event-head { align-items: flex-start; flex-direction: column; }
      .event-actions { width: 100%; justify-content: space-between; }
      .figs { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="brand">
        <span class="live-dot" aria-hidden="true"></span>
        <div>
          <h1>Live Edge Monitor</h1>
          <small>Paper signals only · never places a wager</small>
        </div>
      </div>
      <div class="config" id="config">Loading thresholds…</div>
    </header>

    <div class="grid">
      <aside class="panel panel-pad">
        <h2 class="section-title">Register event</h2>
        <div class="error" id="form-error" role="alert" hidden></div>
        <form id="form">
          <label for="event-name">Event name</label>
          <input id="event-name" name="name" required placeholder="Knicks vs Celtics">
          <label for="sport">Sport</label>
          <input id="sport" name="sport" required placeholder="basketball">
          <label for="home">Home team</label>
          <input id="home" name="home" required>
          <label for="away">Away team</label>
          <input id="away" name="away" required>
          <label for="polymarket-slug">Polymarket slug <span class="optional">(optional)</span></label>
          <input id="polymarket-slug" name="polymarket_slug" placeholder="nba-nyk-bos-2026-…">
          <label for="odds-sport">TheOddsAPI sport key <span class="optional">(optional)</span></label>
          <input id="odds-sport" name="odds_api_sport" placeholder="basketball_nba">
          <label for="odds-event">TheOddsAPI event ID <span class="optional">(optional)</span></label>
          <input id="odds-event" name="odds_api_event_id">
          <button class="btn-primary" id="submit-event" type="submit">Start monitoring</button>
        </form>
        <button class="btn-ghost" id="demo" type="button">Launch live demo</button>
        <p class="note">Research software, not financial advice. Signal quality is a data-quality score, not a predicted win rate.</p>
      </aside>

      <section aria-labelledby="events-heading">
        <h2 class="section-title" id="events-heading">Monitored events</h2>
        <div id="events" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <script>
    const esc = value => String(value ?? "").replace(/[&<>"']/g, character => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
    })[character]);
    const pct = value => `${(value * 100).toFixed(1)}%`;
    const signedPct = value => `${value >= 0 ? "+" : ""}${pct(value)}`;
    const detailKey = (eventId, signal) => encodeURIComponent(`${eventId}|${signal.market}|${signal.outcome}`);
    let refreshInFlight = false;

    function marketRow(eventId, signal, openDetails) {
      const paperBet = signal.action === "PAPER_BET";
      const key = detailKey(eventId, signal);
      const quality = Math.max(0, Math.min(100, signal.confidence));
      return `<div class="market">
        <div class="market-top">
          <div class="outcome">${esc(signal.outcome)}<small>${esc(signal.market)}</small></div>
          <span class="tag ${paperBet ? "bet" : "watch"}">${esc(signal.action.replace("_", " "))}</span>
        </div>
        <div class="figs">
          <div class="fig" title="The engine's estimated probability that this outcome wins">
            <div class="key">Model probability</div>
            <div class="value">${pct(signal.model_probability)}</div>
            <div class="hint">Estimated chance</div>
          </div>
          <div class="fig" title="Model probability minus the best executable market probability">
            <div class="key">Estimated edge</div>
            <div class="value ${signal.edge >= 0 ? "positive" : "negative"}">${signedPct(signal.edge)}</div>
            <div class="hint">Model minus market</div>
          </div>
          <div class="fig" title="Freshness, source agreement/count, spread, and edge strength">
            <div class="key">Signal quality</div>
            <div class="value">${signal.confidence.toFixed(0)}<span class="denominator">/100</span></div>
            <div class="hint">Not a win probability</div>
          </div>
        </div>
        <div class="bar" aria-label="Signal quality ${signal.confidence.toFixed(0)} out of 100"><i style="width:${quality}%"></i></div>
        <details class="why" data-detail-key="${key}"${openDetails.has(key) ? " open" : ""}>
          <summary>Why this signal?</summary>
          <ul>${signal.reasons.map(reason => `<li>${esc(reason)}</li>`).join("")}</ul>
        </details>
      </div>`;
    }

    function eventCard({ event, latest_state: state, signals }, openDetails) {
      const score = state
        ? `${state.home_score}<span class="sep">–</span>${state.away_score}`
        : "—";
      const markets = signals.slice(0, 3).map(signal => marketRow(event.id, signal, openDetails)).join("");
      return `<article class="event" data-event-id="${esc(event.id)}">
        <div class="event-head">
          <div>
            <div class="name">${esc(event.name)}</div>
            <div class="meta">${esc(event.sport)} · ${esc(state?.period || "waiting")} ${esc(state?.clock || "")}</div>
          </div>
          <div class="event-actions">
            <div class="score">${score}</div>
            <button class="btn-remove" type="button" data-remove-event="${esc(event.id)}" aria-label="Remove ${esc(event.name)}">Remove</button>
          </div>
        </div>
        <div class="markets">${markets || '<div class="pending">Waiting for enough market data…</div>'}</div>
      </article>`;
    }

    async function refresh() {
      if (refreshInFlight) return;
      refreshInFlight = true;
      const root = document.querySelector("#events");
      const openDetails = new Set(
        [...root.querySelectorAll("details[open][data-detail-key]")].map(detail => detail.dataset.detailKey)
      );
      try {
        const response = await fetch("/api/events");
        if (!response.ok) throw new Error(`Event refresh failed (${response.status})`);
        const events = await response.json();
        root.innerHTML = events.length
          ? `<div class="stack">${events.map(event => eventCard(event, openDetails)).join("")}</div>`
          : '<div class="panel empty"><b>No events yet</b>Launch the demo or register an event to begin monitoring.</div>';
      } catch (error) {
        if (!root.children.length) {
          root.innerHTML = '<div class="panel empty"><b>Dashboard disconnected</b>Check that the server is still running.</div>';
        }
      } finally {
        refreshInFlight = false;
      }
    }

    document.querySelector("#form").addEventListener("submit", async event => {
      event.preventDefault();
      const form = event.currentTarget;
      const submit = document.querySelector("#submit-event");
      const errorBox = document.querySelector("#form-error");
      const payload = Object.fromEntries(new FormData(form));
      Object.keys(payload).forEach(key => { if (!payload[key]) delete payload[key]; });
      submit.disabled = true;
      errorBox.hidden = true;
      try {
        const response = await fetch("/api/events", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(body.detail || `Could not register event (${response.status})`);
        }
        form.reset();
        await refresh();
      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.hidden = false;
      } finally {
        submit.disabled = false;
      }
    });

    document.querySelector("#demo").addEventListener("click", async event => {
      const button = event.currentTarget;
      button.disabled = true;
      try {
        const response = await fetch("/api/demo", { method: "POST" });
        if (!response.ok) throw new Error("Could not launch demo");
        await refresh();
      } finally {
        button.disabled = false;
      }
    });

    document.querySelector("#events").addEventListener("click", async event => {
      const button = event.target.closest("[data-remove-event]");
      if (!button) return;
      button.disabled = true;
      const response = await fetch(`/api/events/${encodeURIComponent(button.dataset.removeEvent)}`, { method: "DELETE" });
      if (response.ok) await refresh();
      else button.disabled = false;
    });

    fetch("/api/config")
      .then(response => response.json())
      .then(config => {
        document.querySelector("#config").textContent =
          `Quality ≥ ${config.confidence_threshold} · Edge ≥ ${(config.edge_threshold * 100).toFixed(1)}%`;
      })
      .catch(() => { document.querySelector("#config").textContent = "Thresholds unavailable"; });

    refresh();
    setInterval(refresh, 1000);
  </script>
</body>
</html>
