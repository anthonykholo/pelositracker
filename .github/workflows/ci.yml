name: CI

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan repository history for committed secrets
        uses: gitleaks/gitleaks-action@v3

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy

      # maturin develop needs an active virtualenv; it also drops the compiled
      # app._native_engine into the source tree so pytest imports it in place.
      - name: Install deps and build the native engine
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          maturin develop --release

      - name: Python tests
        run: |
          . .venv/bin/activate
          coverage run --branch -m pytest -q
          coverage report --fail-under=70
          coverage report --include='app/calibration.py,app/model_training.py,app/model_registry.py,app/engine.py,app/backtest.py,app/accounts.py' --fail-under=75

      - name: Python lint and focused types
        run: |
          . .venv/bin/activate
          ruff check app tests
          mypy app/domain app/execution.py app/identity.py app/security.py app/settings.py app/calibration.py app/model_training.py app/model_registry.py

      - name: Dependency audit
        run: |
          . .venv/bin/activate
          pip-audit -r requirements.txt

      # extension-module is off by default (Cargo.toml), so cargo can link
      # libpython and run the pure-Rust unit tests.
      - name: Rust tests
        run: cargo test --locked --manifest-path native_engine/Cargo.toml

      - name: Rust formatting and lints
        run: |
          cargo fmt --manifest-path native_engine/Cargo.toml -- --check
          cargo clippy --locked --manifest-path native_engine/Cargo.toml --all-targets -- -D warnings

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build production image
        run: docker build --tag live-edge-monitor:ci .
      - name: Assert non-root runtime user
        run: test "$(docker image inspect live-edge-monitor:ci --format '{{.Config.User}}')" = "app"

  postgres-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-bookworm
        env:
          POSTGRES_USER: tracker
          POSTGRES_PASSWORD: tracker
          POSTGRES_DB: tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Apply every store migration twice
        env:
          DATABASE_URL: postgresql://tracker:tracker@127.0.0.1:5432/tracker
        run: |
          python -m pip install -r requirements-dev.txt
          python -c "from app.history import HistoryDB; from app.ledger import Ledger; from app.accounts import AccountBook; from app.monitor_state import MonitorState; stores=[HistoryDB(),Ledger(),AccountBook(),MonitorState()]; [s.close() for s in stores]; stores=[HistoryDB(),Ledger(),AccountBook(),MonitorState()]; [s.close() for s in stores]"
