name: Docker build

# Validates the deploy image (builds the Rust engine + installs the app wheel)
# so a broken Dockerfile is caught in CI, not on the deploy host.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "requirements.txt"
      - "native_engine/**"
      - "app/**"
      - ".github/workflows/docker.yml"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: live-edge-monitor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test the image boots and serves
        run: |
          docker run -d --name lem -p 8000:8000 live-edge-monitor:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/ready >/dev/null; then
              echo "server is ready"; curl -fsS http://localhost:8000/api/ready; exit 0
            fi
            sleep 2
          done
          echo "server did not come up"; docker logs lem; exit 1
